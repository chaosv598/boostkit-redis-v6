# Patch overlay CI — v6.0
#
#   lint + apply（冲突 feature 分别验证）
#   本地全量: bash tools/verify.sh

name: ci

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install pyyaml
        run: pip install pyyaml --quiet
      - name: Verify (lint + apply)
        run: SKIP_INSTALL=1 bash tools/verify.sh
