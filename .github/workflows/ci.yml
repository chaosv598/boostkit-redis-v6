# Patch overlay CI — v6.0
#
#   lint: manifest + DEP-3 + headers（秒级，全自动）
#   apply: 本地/CI 需指定 --features 避开冲突
#     bash tools/verify.sh
#     SKIP_INSTALL=1 bash tools/apply_patch.sh --features "kunpeng-iouring" src/Redis-7.0.15 /tmp/build

name: ci

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install pyyaml
        run: pip install pyyaml --quiet
      - name: Lint
        run: python3 tools/lint.py all src/*/
