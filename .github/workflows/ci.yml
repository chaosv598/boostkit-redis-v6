# Patch overlay CI — v6.0 Buildroot 精简模型
#
# 流程:
#   1. tools/verify.sh   — 仓根禁放 + manifest schema + clean apply
#   2. .github/lint.py manifest — manifest schema + DEP-3 必填
#   3. .github/lint.py headers  — patch 头 schema
#
# v6.0: 砍掉 features 段 + depends + default，manifest 仅 3 字段，feature 自动发现

name: ci

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pyyaml
        run: pip install pyyaml --quiet

      - name: Verify (structure + clean apply)
        run: bash tools/verify.sh

      - name: Manifest + DEP-3 lint
        run: python3 .github/lint.py manifest versions/*/

      - name: Patch header lint
        run: python3 .github/lint.py headers versions/*/
