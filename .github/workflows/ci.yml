# Patch overlay CI — v6.0
#
#   tools/lint.py all — manifest + DEP-3 + headers（秒级）
#   apply 验证在本地 / Kunpeng runner 上跑: bash tools/verify.sh

name: ci

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install pyyaml
        run: pip install pyyaml --quiet
      - name: Lint
        run: python3 tools/lint.py all src/*/
