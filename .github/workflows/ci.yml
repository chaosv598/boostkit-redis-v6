# Patch overlay CI — v6.0
#
# 流程:
#   1. tools/lint.py all  — 快速 gate: manifest + DEP-3 + patch headers
#   2. tools/verify.sh    — 结构 + clean apply

name: ci

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pyyaml
        run: pip install pyyaml --quiet

      - name: Lint (manifest + DEP-3 + headers)
        run: python3 tools/lint.py all src/*/

      - name: Verify (structure + clean apply)
        run: bash tools/verify.sh
